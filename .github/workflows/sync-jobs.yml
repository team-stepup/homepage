name: 求人データ同期 (API→静的JSON)

# 採用情報の求人を、別ドメインの公開API(func-employee-portal-7833)から取得して
# このリポジトリ(team-stepup.com)上の jobs-{ja,pt,en}.json に書き出す。
# ホームページは同じドメインのこのJSONを読むので、端末側のコンテンツブロッカーや
# 回線フィルタで別ドメインへのアクセスが止まっても、求人が確実に表示される。

on:
  schedule:
    - cron: '*/5 * * * *'   # 5分おき(GitHubの都合で多少前後あり)
  workflow_dispatch:          # 手動でも即実行できる(Actionsタブ→Run workflow)

permissions:
  contents: write

concurrency:
  group: sync-jobs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 公開APIから求人を取得 (ja/pt/en)
        run: |
          set -e
          BASE="https://func-employee-portal-7833.azurewebsites.net/api/jobs"
          for L in ja pt en; do
            curl -fsS --max-time 30 "$BASE?lang=$L" -o "jobs-$L.tmp"
            python3 -c "import json; json.load(open('jobs-$L.tmp', encoding='utf-8'))"   # JSON妥当性チェック(壊れたデータで上書きしない)
            mv "jobs-$L.tmp" "jobs-$L.json"
          done

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jobs-ja.json jobs-pt.json jobs-en.json
          if git diff --staged --quiet; then
            echo "求人に変更なし"
          else
            git commit -m "求人データ自動同期 [skip ci]"
            git push
          fi
